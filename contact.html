<!DOCTYPE html>
<html lang="fr" class="dark scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Contactez-nous — YT Downloader support et suggestions.">
<meta property="og:title" content="Contact — YT Downloader">
<meta property="og:description" content="Contactez l'équipe YT Downloader pour toute question ou suggestion.">
<meta property="og:image" content="https://yt-downloader-docs.vercel.app/assets/og-image.png">
<meta property="og:url" content="https://yt-downloader-docs.vercel.app/contact.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Contact — YT Downloader">
<meta name="twitter:image" content="https://yt-downloader-docs.vercel.app/assets/og-image.png">
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config = { darkMode:'class', theme:{ extend:{ fontFamily:{ sans:['Inter','system-ui','sans-serif'] }, colors:{ brand:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5'} } } } }
</script>
</head>
<body class="bg-white dark:bg-[#0a0a14] text-gray-900 dark:text-white font-sans antialiased transition-colors">
<nav id="site-nav"></nav>

<section class="pt-24 sm:pt-32 pb-16 sm:pb-24">
  <div class="max-w-2xl mx-auto px-4">
    <div class="text-center mb-10 sm:mb-14">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-50 dark:bg-indigo-500/10 mb-5">
        <i class="fas fa-envelope text-2xl text-indigo-500"></i>
      </div>
      <h1 class="text-3xl sm:text-4xl font-black text-gray-900 dark:text-white mb-3" data-fr="Contact" data-en="Contact">Contact</h1>
      <p class="text-gray-500 dark:text-gray-400 text-base max-w-md mx-auto" data-fr="Une question, un bug, une suggestion ? On t'écoute." data-en="A question, a bug, a suggestion? We're listening.">Une question, un bug, une suggestion ? On t'écoute.</p>
    </div>

    <form id="contact-form" class="space-y-5 bg-gray-50 dark:bg-white/[0.02] border border-gray-200 dark:border-white/5 rounded-2xl p-6 sm:p-8">
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2" data-fr="Nom" data-en="Name">Nom</label>
        <input type="text" id="c-name" required class="w-full px-4 py-3 rounded-xl bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" data-fr-placeholder="Votre nom" data-en-placeholder="Your name" placeholder="Votre nom">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2" data-fr="Email" data-en="Email">Email</label>
        <input type="email" id="c-email" required class="w-full px-4 py-3 rounded-xl bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" data-fr-placeholder="votre@email.com" data-en-placeholder="your@email.com" placeholder="votre@email.com">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2" data-fr="Sujet" data-en="Subject">Sujet</label>
        <select id="c-subject" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
          <option value="Bug / Problème technique" data-fr="Bug / Problème technique" data-en="Bug / Technical issue">Bug / Problème technique</option>
          <option value="Suggestion / Amélioration" data-fr="Suggestion / Amélioration" data-en="Suggestion / Improvement">Suggestion / Amélioration</option>
          <option value="Nouvelle fonctionnalité" data-fr="Nouvelle fonctionnalité" data-en="Feature request">Nouvelle fonctionnalité</option>
          <option value="Autre" data-fr="Autre" data-en="Other">Autre</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2" data-fr="Message" data-en="Message">Message</label>
        <textarea id="c-message" rows="5" required class="w-full px-4 py-3 rounded-xl bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all resize-none" data-fr-placeholder="Décrivez votre problème ou suggestion..." data-en-placeholder="Describe your issue or suggestion..." placeholder="Décrivez votre problème ou suggestion..."></textarea>
      </div>
      <button type="submit" id="c-send" class="w-full py-3 px-6 rounded-xl bg-indigo-500 hover:bg-indigo-600 text-white font-semibold text-sm transition-all shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98]">
        <span id="c-send-text" data-fr="Envoyer" data-en="Send">Envoyer</span>
        <i id="c-send-icon" class="fas fa-paper-plane ml-2"></i>
      </button>
      <div id="c-status" class="hidden text-center text-sm font-medium rounded-xl py-3"></div>
    </form>

    <div class="mt-8 text-center">
      <p class="text-xs text-gray-400 dark:text-gray-500" data-fr="Tu peux aussi nous écrire directement à" data-en="You can also write to us directly at">Tu peux aussi nous écrire directement à</p>
      <a href="mailto:koffilevis21@gmail.com" class="text-sm text-indigo-500 hover:text-indigo-400 font-medium transition-colors">koffilevis21@gmail.com</a>
    </div>
  </div>
</section>

<footer id="site-footer" class="border-t border-gray-200 dark:border-white/5"></footer>
<script src="shared.js"></script>
<script>
document.getElementById('contact-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('c-send');
  const txt = document.getElementById('c-send-text');
  const icon = document.getElementById('c-send-icon');
  const status = document.getElementById('c-status');
  const origText = txt.textContent;

  btn.disabled = true;
  txt.textContent = lang === 'fr' ? 'Envoi...' : 'Sending...';
  icon.className = 'fas fa-spinner fa-spin ml-2';

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('c-name').value.trim(),
        email: document.getElementById('c-email').value.trim(),
        subject: document.getElementById('c-subject').value,
        message: document.getElementById('c-message').value.trim(),
      })
    });
    const data = await res.json();

    if (data.ok) {
      status.className = 'text-center text-sm font-medium rounded-xl py-3 bg-green-50 dark:bg-green-500/10 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-500/20';
      status.textContent = lang === 'fr' ? 'Message envoyé ! On te répondra rapidement.' : 'Message sent! We\'ll get back to you soon.';
      status.classList.remove('hidden');
      document.getElementById('contact-form').reset();
    } else {
      throw new Error(data.error);
    }
  } catch (err) {
    status.className = 'text-center text-sm font-medium rounded-xl py-3 bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-500/20';
    status.textContent = lang === 'fr' ? 'Erreur lors de l\'envoi. Réessayez.' : 'Error sending. Please try again.';
    status.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    txt.textContent = origText;
    icon.className = 'fas fa-paper-plane ml-2';
  }
});
</script>
</body>
</html>
