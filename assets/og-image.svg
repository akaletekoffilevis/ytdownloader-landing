<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="280" r="200" fill="#818cf8" opacity="0.06"/>
  <circle cx="300" cy="400" r="150" fill="#6366f1" opacity="0.04"/>
  <circle cx="900" cy="200" r="120" fill="#818cf8" opacity="0.03"/>
  <!-- Logo circle -->
  <circle cx="600" cy="230" r="60" fill="url(#accent)" opacity="0.15"/>
  <text x="600" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="40" fill="#818cf8">&#9654;</text>
  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="#ffffff">YT Downloader</text>
  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#9ca3af">Téléchargez vos vidéos YouTube</text>
  <!-- Platforms -->
  <text x="600" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#6b7280">Windows · Linux · macOS</text>
  <!-- Badge -->
  <rect x="490" y="500" width="220" height="36" rx="18" fill="#818cf8" opacity="0.12"/>
  <text x="600" y="524" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#818cf8">v0.2.0 — Open Source</text>
</svg>
