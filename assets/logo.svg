<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="arrow" x1="256" y1="180" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
  <!-- Play triangle (subtle, behind) -->
  <path d="M220 180 L220 332 L340 256 Z" fill="rgba(255,255,255,0.15)" rx="8"/>
  <!-- Download arrow -->
  <path d="M256 190 L256 310" stroke="url(#arrow)" stroke-width="28" stroke-linecap="round"/>
  <path d="M210 275 L256 320 L302 275" stroke="url(#arrow)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom line -->
  <path d="M190 340 L322 340" stroke="rgba(255,255,255,0.7)" stroke-width="24" stroke-linecap="round"/>
</svg>
